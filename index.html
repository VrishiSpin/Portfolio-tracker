            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
            document.querySelector(`[data-content="${tabName}"]`).classList.add('active');
        }
        
        // Render all categories
        function renderAll() {
            Object.keys(portfolioData).forEach(category => {
                renderCategory(category);
            });
        }
        
        // Render category
        function renderCategory(category) {
            const container = document.getElementById(`${category}-list`);
            if (!container) return;
            
            container.innerHTML = '';
            
            portfolioData[category].forEach((item, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'item';
                
                let html = `<div class="item-title">${item.title}</div>`;
                if (item.date) html += `<div class="item-meta">📅 ${item.date}</div>`;
                if (item.role) html += `<div class="item-meta">👤 ${item.role}</div>`;
                if (item.hours) html += `<div class="item-meta">⏱️ ${item.hours} hours</div>`;
                if (item.description) html += `<div class="item-description">${item.description}</div>`;
                
                html += `<div class="item-actions">
                    <button class="edit-btn">Edit</button>
                    <button class="delete-btn">Delete</button>
                </div>`;
                
                itemDiv.innerHTML = html;
                
                // Attach event listeners
                itemDiv.querySelector('.edit-btn').addEventListener('click', () => editItem(category, index));
                itemDiv.querySelector('.delete-btn').addEventListener('click', () => deleteItem(category, index));
                
                container.appendChild(itemDiv);
            });
        }
        
        // Open modal
        function openModal(category) {
            currentCategory = category;
            editingIndex = -1;
            document.getElementById('modalTitle').textContent = `Add ${category.charAt(0).toUpperCase() + category.slice(1, -1)}`;
            document.getElementById('itemForm').reset();
            document.getElementById('itemModal').classList.add('active');
        }
        
        // Close modal
        function closeModal() {
            document.getElementById('itemModal').classList.remove('active');
        }
        
        // Edit item
        function editItem(category, index) {
            currentCategory = category;
            editingIndex = index;
            const item = portfolioData[category][index];
            
            document.getElementById('modalTitle').textContent = 'Edit Item';
            document.getElementById('itemTitle').value = item.title || '';
            document.getElementById('itemDate').value = item.date || '';
            document.getElementById('itemRole').value = item.role || '';
            document.getElementById('itemDescription').value = item.description || '';
            document.getElementById('itemHours').value = item.hours || '';
            
            document.getElementById('itemModal').classList.add('active');
        }
        
        // Delete item
        function deleteItem(category, index) {
            if (confirm('Are you sure you want to delete this item?')) {
                portfolioData[category].splice(index, 1);
                renderCategory(category);
                updateStats();
                saveToLocalStorage();
            }
        }
        
        // Handle form submit
        function handleFormSubmit(e) {
            e.preventDefault();
            
            const newItem = {
                title: document.getElementById('itemTitle').value,
                date: document.getElementById('itemDate').value,
                role: document.getElementById('itemRole').value,
                description: document.getElementById('itemDescription').value,
                hours: document.getElementById('itemHours').value ? parseInt(document.getElementById('itemHours').value) : null
            };
            
            if (editingIndex >= 0) {
                portfolioData[currentCategory][editingIndex] = newItem;
            } else {
                portfolioData[currentCategory].push(newItem);
            }
            
            renderCategory(currentCategory);
            updateStats();
            saveToLocalStorage();
            closeModal();
        }
        
        // Update stats
        function updateStats() {
            updateStatsDisplay();
        }
        
        // Handle search
        function handleSearch(e) {
            const searchTerm = e.target.value.toLowerCase();
            
            Object.keys(portfolioData).forEach(category => {
                const container = document.getElementById(`${category}-list`);
                if (!container) return;
                
                const items = container.querySelectorAll('.item');
                items.forEach(item => {
                    const text = item.textContent.toLowerCase();
                    item.style.display = text.includes(searchTerm) ? 'block' : 'none';
                });
            });
        }
        
        // Export data
        function exportData() {
            const fullData = {
                stats: stats,
                portfolio: portfolioData
            };
            const dataStr = JSON.stringify(fullData, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'vrishank-portfolio-data.json';
            link.click();
        }
        
        // Import data
        function importData(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    
                    if (imported.stats && imported.portfolio) {
                        stats = imported.stats;
                        portfolioData = imported.portfolio;
                    } else {
                        portfolioData = imported;
                    }
                    
                    renderAll();
                    updateStats();
                    updateStatsDisplay();
                    saveToLocalStorage();
                    alert('Data imported successfully!');
                } catch (error) {
                    alert('Error importing data. Please check the file format.');
                }
            };
            reader.readAsText(file);
        }
        
        // Generate resume
        function generateResume() {
            let resume = 'VRISHANK RAM - ACTIVITY PORTFOLIO\n';
            resume += '='.repeat(50) + '\n\n';
            resume += `UW GPA: ${stats.gpa} | W GPA: ${stats.wgpa} | SAT: ${stats.sat}\n`;
            resume += `Coursework: ${portfolioData.academics.length} | Projects: ${portfolioData.projects.length}\n\n`;
            
            Object.keys(portfolioData).forEach(category => {
                resume += `${category.toUpperCase()}\n`;
                resume += '-'.repeat(50) + '\n';
                portfolioData[category].forEach(item => {
                    resume += `• ${item.title}`;
                    if (item.date) resume += ` (${item.date})`;
                    if (item.role) resume += ` - ${item.role}`;
                    resume += '\n';
                    if (item.description) resume += `  ${item.description}\n`;
                    if (item.hours) resume += `  Hours: ${item.hours}\n`;
                    resume += '\n';
                });
                resume += '\n';
            });
            
            const blob = new Blob([resume], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'vrishank-resume.txt';
            link.click();
        }
        
        // Save to localStorage
        function saveToLocalStorage() {
            const saveData = {
                stats: stats,
                portfolio: portfolioData
            };
            localStorage.setItem('vrishankPortfolio', JSON.stringify(saveData));
        }
        
        // Load from localStorage
        function loadFromLocalStorage() {
            const saved = localStorage.getItem('vrishankPortfolio');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    if (data.stats && data.portfolio) {
                        stats = data.stats;
                        portfolioData = data.portfolio;
                    }
                    renderAll();
                    updateStats();
                    updateStatsDisplay();
                } catch (e) {
                    console.log('Using default data');
                }
            }
        }
        
        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>
</html>
